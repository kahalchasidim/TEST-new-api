<!DOCTYPE html>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Suez+One&display=swap');

 /* 1. Back to the clean Assistant font */
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Suez+One&display=swap');

  /* This ensures the Tachanun reason can use two lines if needed */
  #status-sub { 
    font-size: 3.2vh; /* Lowered from 3.5vh to stop the bottom cutoff */
    color: white;

    width: 100%;

  }
  .teal-box { background: #004d40; color: #00bfa5; } 
  .gold-box { color: var(--gold); background: #050505; }
  #status-head { 
    font-size: 6.2vh; /* Slightly smaller to stop the top cutoff */
    line-height: 1.0; 
    display: block; 
    width: 100%;
  }
  #status-sub { 
    font-size: 3.2vh; 
    color: white; 
    display: block; 
    width: 100%;
    white-space: normal; 
    line-height: 0.9; /* Tightened to stop the bottom cutoff */
  }

  .main-body { height: 71vh; display: flex; gap: 10px; }
  .zemanim-col { width: 21vw; border: 2px solid var(--gold); border-radius: 10px; display: flex; flex-direction: column; padding: 2px; background: #050505; }
  .z-row { display: flex; justify-content: space-between; padding: 0px 8px; border-bottom: 1px solid #222; align-items: center; flex: 1; }
  .z-label { color: var(--gold); font-size: 3.1vh; }
  .z-time { color: white; font-size: 2.7vh; font-family: 'Assistant', sans-serif; font-weight: 800; direction: ltr; }
  .active-zman { background: var(--gold) !important; }
  .active-zman .z-label, .active-zman .z-time { color: #000 !important; }

  .content-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .data-box { flex: 1.2; border: 2px solid var(--gold); border-radius: 10px; background: #080808; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0; overflow: hidden; }
  .data-box span { font-weight: 800; font-size: 4.8vh; line-height: 1.1; display: block; width: 100%; word-wrap: break-word; }
  
  .img-box { flex: 1.5; border: 2px solid var(--gold); border-radius: 10px; background: #000; overflow: hidden; position: relative; }
  .img-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
  
  .omer-box { flex: 1.3; border: 2px solid var(--gold); border-radius: 10px; background: #001f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0; text-align: center; }
 .omer-header { 
    display: none! important; 
  }

  #O2 { 
    color: var(--gold); 
    font-weight: 800; 
    line-height: 1.0; /* Back to a standard clean line height */
    width: 94%;       /* 3% margin on each side for a clean 'framed' look */
    display: block; 
    margin: 0 auto;

  }
  #O_BECHINA { font-size: 3.5vh; color: #fff; border-top: 1px solid #444; padding-top: 2px; margin-top: 6px; width: 90%; }
  .secs { font-size: 0.75em; opacity: 0.6; font-weight: 400; margin-left: 1px; }
</style>

  </div>
</div>
<script>
/**
 * THE BAYSWATER PROTOCOL - MASTER RULES
 * ---------------------------------------------------
 * 1. CLOCK: 12h format with ticking seconds.
 * 2. MATH: 
 * - Rabbeinu Tam (Zman 11) = Schedule + 1 Minute.
 * - Candle Lighting = Schedule - 1 Minute.
 * 3. FLIP LOGIC:
 * - Date & Parsha: Flip to NEXT day at Alos (Zman #1).
 * - Omer: Flip to NEXT day 25 Minutes BEFORE Rabbeinu Tam (Zman #11).
 * 4. STATUS BOX:
 * - Shabbat: Friday Candles until Saturday RT (72).
 * - Motzaei Shabbat: At RT (72) on Saturday.
 * - Tachanun: Teal box + Reason.
 * - Default: "מוריד הטל / ותן ברכה".
 */

const $ = id => document.getElementById(id);
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjNSAvH290v-6SFkXHJfFHAr8Kh4UlmZxAIQf7-PFFFHWTNOkYDGTggyPz130gG6_Low/exec"; 

var defaultSummerMsg = ""; 
var p1Images = [];
var p1Index = 0;

const OMER_STRINGS = {
  1:"יום אחד", 2:"שני ימים", 3:"שלשה ימים", 4:"ארבעה ימים", 5:"חמשה ימים", 6:"ששה ימים", 7:"שבוע אחד",
  8:"שמונה ימים שהם שבוע אחד ויום אחד", 9:"תשעה ימים שהם שבוע אחד ושני ימים", 10:"עשרה ימים שהם שבוע אחד וששלשה ימים",
  11:"אחד עשר יום שהם שבוע אחד וארבעה ימים", 12:"שנים עשר יום שהם שבוע אחד וחמשה ימים", 13:"שלשה עשר יום שהם שבוע אחד וששה ימים", 14:"ארבעה עשר יום שהם שני שבועות",
  15:"חמשה עשר יום שהם שני שבועות ויום אחד", 16:"ששה עשר יום שהם שני שבועות ושני ימים", 17:"שבעה עשר יום שהם שני שבועות ושלשה ימים", 18:"שמונה עשר יום שהם שני שבועות וארבעה ימים", 19:"תשעה עשר יום שהם שני שבועות וחמשה ימים", 20:"עשרים יום שהם שני שבועות וששה ימים", 21:"אחד ועשרים יום שהם שלשה שבועות",
  22:"שנים ועשרים יום שהם שלשה שבועות ויום אחד", 23:"שלשה ועשרים יום שהם שלשה שבועות ושני ימים", 24:"ארבעה ועשרים יום שהם שלשה שבועות ושלשה ימים", 25:"חמשה ועשרים יום שהם שלשה שבועות וארבעה ימים", 26:"ששה ועשרים יום שהם שלשה שבועות וחמשה ימים", 27:"שבעה ועשרים יום שהם שלשה שבועות וששה ימים", 28:"שמונה ועשרים יום שהם ארבעה שבועות",
  29:"תשעה ועשרים יום שהם ארבעה שבועות ויום אחד", 30:"שלשים יום שהם ארבעה שבועות ושני ימים", 31:"אחד ושלשים יום שהם ארבעה שבועות ושלשה ימים", 32:"שנים ושלשים יום שהם ארבעה שבועות וארבעה ימים", 33:"שלשה ושלשים יום שהם ארבעה שבועות וחמשה ימים", 34:"ארבעה ושלשים יום שהם ארבעה שבועות וששה ימים", 35:"חמשה ושלשים יום שהם חמשה שבועות",
  36:"ששה ושלשים יום שהם חמשה שבועות ויום אחד", 37:"שבעה ושלשים יום שהם חמשה שבועות ושני ימים", 38:"שמונה ושלשים יום שהם חמשה שבועות ושלשה ימים", 39:"תשעה ושלשים יום שהם חמשה שבועות וארבעה ימים", 40:"ארבעים יום שהם חמשה שבועות וחמשה ימים", 41:"אחד וארבעים יום שהם חמשה שבועות וששה ימים", 42:"שנים וארבעים יום שהם ששה שבועות",
  43:"שלשה וארבעים יום שהם ששה שבועות ויום אחד", 44:"ארבעה וארבעים יום שהם ששה שבועות ושני ימים", 45:"חמשה וארבעים יום שהם ששה שבועות ושלשה ימים", 46:"ששה וארבעים יום שהם ששה שבועות וארבעה ימים", 47:"שבעה וארבעים יום שהם ששה שבועות וחמשה ימים", 48:"שמונה וארבעים יום שהם ששה שבועות וששה ימים", 49:"תשעה וארבעים יום שהם שבעה שבועות"
};
const DAY_MAP = { "Sun": "יום ראשון", "Mon": "יום שני", "Tue": "יום שלישי", "Wed": "יום רביעי", "Thu": "יום חמישי", "Fri": "ערב ש\"ק", "Sha": "שבת קודש", "Sat": "שבת קודש" };
var schedule = {}, lastDateIso = "", currentStatusHTML = "", currentlyHighlightedId = null;

function shiftTime(t, o) {
    if (!t || t.includes("--")) return "--:--:--";
    let p = t.split(':'), h = parseInt(p[0]), m = parseInt(p[1]), s = parseInt(p[2]||0);
    let total = (h*3600) + (m*60) + s + (o * 60);
    let nh = Math.floor(total / 3600), nm = Math.floor((total % 3600) / 60), ns = total % 60;
    if (nh > 12) nh -= 12; if (nh === 0) nh = 12;
    return nh + ":" + String(nm).padStart(2, '0') + ":" + String(ns).padStart(2, '0');
}
function fmtZman(t) {
    if (!t || t.includes("--")) return "--:--";
    let c = t.replace(/(AM|PM|am|pm)/g, "").trim();
    let p = c.split(':');
    return `${p[0]}:${p[1]}<span class="secs">:${p[2] || "00"}</span>`;
}
function getSec(t, pm) {
    if (!t || t.includes("--")) return 0;
    let p = t.split(':'), h = parseInt(p[0]), m = parseInt(p[1]), s = parseInt(p[2]||0);
    if (pm && h < 12) h += 12;
    return (h * 3600) + (m * 60) + s;
}
function getIso(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0'); }
function fit(el, vhStart) {
    if (!el) return;
    let p = el.parentElement; let vh = vhStart; el.style.fontSize = vh + "vh";
    while (p.scrollHeight > p.clientHeight && vh > 1.0) { vh -= 0.1; el.style.fontSize = vh + "vh"; }
}
function updateClock() {
    let n = new Date(); 
    let h = n.getHours();
    
    // Create the three parts
    let hh = (h % 12 || 12);
    let mm = String(n.getMinutes()).padStart(2, '0');
    let ss = String(n.getSeconds()).padStart(2, '0');
    
    // Wrap them in spans so they stay in their fixed "spots"
    $('CLOCK').innerHTML = `<span class="c-unit">${hh}</span>:<span class="c-unit">${mm}</span>:<span class="c-unit">${ss}</span>`;
    
    $('ENG_DATE').innerText = n.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function loadWeather() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=40.598&longitude=-73.765&current_weather=true&temperature_unit=fahrenheit")
    .then(r => r.json()).then(d => { if(d.current_weather) $('WEATHER').innerText = " | " + Math.round(d.current_weather.temperature) + "°F"; });
}

function rotateP1() {
    if (p1Images.length === 0) return;
    $('p1').style.opacity = 0;
    setTimeout(() => {
        $('p1').src = "https://drive.google.com/thumbnail?id=" + p1Images[p1Index] + "&sz=w1200";
        $('p1').style.opacity = 1;
        p1Index = (p1Index + 1) % p1Images.length;
    }, 800); 
}

function updateUI() {
    let now = new Date(); let h = now.getHours(); let cSec = (h*3600) + (now.getMinutes()*60) + now.getSeconds();
    let dToday = schedule[getIso(now)]; if (!dToday) return;
    let rtSecs = getSec(dToday.z[10], true);
    let oIso = (cSec >= (rtSecs - 1500)) ? getIso(new Date(now.getTime() + 86400000)) : getIso(now);
    let dIso = (cSec < getSec(dToday.z[0], false)) ? getIso(new Date(now.getTime() - 86400000)) : getIso(now);
    let dOmer = schedule[oIso] || dToday, dDate = schedule[dIso] || dToday;
    
    if (dIso !== lastDateIso) {
        lastDateIso = dIso;
        $('DAY_LABEL').innerText = DAY_MAP[dDate.day] || dDate.day;
        $('DATE_LABEL').innerText = dDate.heb;
        $('PARSHA_LABEL').innerText = dDate.parsha ? "פרשת " + dDate.parsha : "";
        for (let i=1; i<=11; i++) {
            let bt = dDate.z[i-1];
            $('z'+i).innerHTML = fmtZman((i === 11) ? shiftTime(bt, 1) : bt);
        }
    }
    
    if (now.getDay() === 5) {
        $('row_special').style.display = 'flex';
        $('z_spec_time').innerHTML = fmtZman(shiftTime(dToday.candle || dToday.z[9], -1));
    } else { $('row_special').style.display = 'none'; }
    
    let moledInfo = dDate.moled || "";
    let isMoledTime = (cSec >= 32400 && cSec <= 45000); 

// --- THE BATTLE FOR THE BOTTOM BOX (CLEAN VERSION) ---
    let omerKey = dOmer.omerNum? String(dOmer.omerNum).trim() : null;

    if (moledInfo && isMoledTime) {
        // 1. MOLED MODE
        $('O2').innerText = moledInfo;
        $('O_BECHINA').style.display = 'none';
    } else if (omerKey) {
        // 2. OMER MODE
        $('O2').innerText = "היום " + (OMER_STRINGS[omerKey] || omerKey + " יום") + " לעומר";
        if (dOmer.bechina && dOmer.bechina.trim() !== "") {
            $('O_BECHINA').innerText = dOmer.bechina;
            $('O_BECHINA').style.display = 'block';
        } else { $('O_BECHINA').style.display = 'none'; }
    } else {
        // 3. SUMMER MODE
        $('O_BECHINA').style.display = 'none';
        $('O2').innerText = defaultSummerMsg;
    }
 // --- THE GOLDILOCKS FIT ---
    // We start at 6.0vh. If it fits, it stays. 
    // If it hits the walls, it shrinks until it clears.
    fit($('O2'), 5.5); 

    // Bechina text starts slightly smaller to stay subordinate
    fit($('O_BECHINA'), 3.8);

    // --- STATUS BOX LOGIC ---
    let tR = dDate.tachReason, dayW = now.getDay();
    let isShab = (dayW===5 && dToday.candle && cSec >= getSec(dToday.candle,true)) || (dayW===6 && cSec < rtSecs);
    let isMotz = (dayW===6 && cSec >= rtSecs);
    
    let head = "";
    if (isShab) {
        head = (moledInfo && moledInfo.trim() !== "") ? "שבת מברכים" : "שבת קודש";
    } else if (isMotz) {
        head = "מוצאי שבת";
    } else {
        head = tR ? "אין אומרים תחנון" : "מוריד הטל";
    }

    let sub = "";
    if (isShab) {
        sub = (moledInfo && dDate.rcInfo) ? dDate.rcInfo : ""; 
    } else if (isMotz) {
        sub = "אתה חוננתנו";
    } else {
        sub = tR ? tR : "ותן ברכה";
    }

    let cls = (isShab || isMotz || !tR) ? "gold-box" : "teal-box";
    let sH = `<div class="message-box ${cls}"><span id="status-head">${head}</span><span id="status-sub">${sub}</span></div>`;
    
  if (sH !== currentStatusHTML) { 
        $('LEFT_MSG').innerHTML = sH; 
        currentStatusHTML = sH; 
        
        // --- NEW SAFETY BASELINES ---
        // Lowered to ensure they sit centered in the 18vh height
        fit($('status-head'), 5.5); 
        fit($('status-sub'), 2.8);
    }
    let currentZmanTimes = [];
    for(let i=1; i<=11; i++) currentZmanTimes.push({id: 'r'+i, sec: getSec(dDate.z[i-1], i>=7)});
    let nIdx = currentZmanTimes.findIndex(z => z.sec > cSec), tgtId = nIdx !== -1 ? currentZmanTimes[nIdx].id : null;
    if (tgtId !== currentlyHighlightedId) {
        document.querySelectorAll('.z-row').forEach(r => r.classList.remove('active-zman'));
        if (tgtId && $(tgtId)) $(tgtId).classList.add('active-zman');
        currentlyHighlightedId = tgtId;
    }
}

function loadData() {
    fetch(SCRIPT_URL + "?cb=" + new Date().getTime()).then(r => r.json()).then(d => {
        if (!d) return;
        schedule = d.schedule;
        defaultSummerMsg = d.defaultMsg || "";
        p1Images = d.p1List || [];
        if (p1Images.length > 0 && !$('p1').src) { rotateP1(); }
        $('ANN').innerText = d.announcements || ""; fit($('ANN'), 4.8);
        $('TEF').innerText = d.tefila || ""; fit($('TEF'), 4.8);
        if (d.p4) $('p4').src = "https://drive.google.com/thumbnail?id="+d.p4+"&sz=w1200";
        if (d.p5) $('p5').src = "https://drive.google.com/thumbnail?id="+d.p5+"&sz=w1200";
    });
}

setInterval(updateClock, 1000); 
updateClock(); 
loadWeather(); 
setInterval(loadWeather, 900000);
loadData(); 
setInterval(loadData, 30000); 
setInterval(updateUI, 1000);
setInterval(rotateP1, 15000);
</script>
